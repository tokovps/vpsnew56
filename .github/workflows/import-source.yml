name: Import and validate VPSNEW56 source

on:
  push:
    paths:
      - .github/import/READY

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          archive_b64="$(mktemp)"
          archive="$(mktemp --suffix=.tar.xz)"
          temp_dir="$(mktemp -d)"
          cat .github/import/archive.part-* > "$archive_b64"
          base64 --decode "$archive_b64" > "$archive"
          echo "ebf69464f9e78b6d50806e5e74a5a287ef8e1be28bcb59e7540f144f41449a6c  $archive" | sha256sum -c -
          tar -xJf "$archive" -C "$temp_dir"
          test -d "$temp_dir/vpsnew56-main"
          echo "SOURCE_ROOT=$temp_dir/vpsnew56-main" >> "$GITHUB_ENV"

      - name: Install dependencies and validate revision
        shell: bash
        run: |
          set -euo pipefail
          cd "$SOURCE_ROOT"
          npm ci --no-audit --no-fund
          node scripts/render-preflight.js
          npm run test:revision56
          node tests/animated-ui-retrofit.test.js
          node tests/selective-loading-policy.test.js
          npm run test:rdp-final
          node tests/render-deploy-smoke.test.js
          find src scripts tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          rm -rf node_modules

      - name: Replace repository source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          shopt -s dotglob nullglob
          cp -a "$SOURCE_ROOT"/. ./
          rm -rf node_modules

      - name: Commit validated source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Revise Indonesian language, broadcasts, and RDP menu"
          git push origin HEAD:main
