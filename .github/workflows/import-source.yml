name: Import and validate VPSNEW56 source

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  import-source:
    if: github.event.issue.title == 'IMPORT_VPSNEW56_VALIDATED_SOURCE'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Clone source and apply verified revision
        shell: bash
        run: |
          set -euo pipefail
          source_dir="$(mktemp -d)/vpsnew55"
          patch_b64="$(mktemp)"
          patch_xz="$(mktemp --suffix=.patch.xz)"
          patch_file="$(mktemp --suffix=.patch)"
          git clone --depth 1 https://github.com/tokovps/vpsnew55.git "$source_dir"
          cat .github/import/patch-xz.part-* > "$patch_b64"
          base64 --decode "$patch_b64" > "$patch_xz"
          echo "a5ef600b6d10ae981c1c5e2e2f0fa3c2ca41410b827029e18cf1ee0aaaaf0766  $patch_xz" | sha256sum -c -
          xz --decompress --stdout "$patch_xz" > "$patch_file"
          echo "f251ec86b06b11ba0854b30fb1d7045797dc4718caf8e07b1b6522dca4bcc6a5  $patch_file" | sha256sum -c -
          cd "$source_dir"
          git apply --check "$patch_file"
          git apply "$patch_file"
          echo "SOURCE_ROOT=$source_dir" >> "$GITHUB_ENV"

      - name: Install dependencies and validate revision
        shell: bash
        run: |
          set -euo pipefail
          cd "$SOURCE_ROOT"
          npm ci --no-audit --no-fund
          node scripts/render-preflight.js
          npm run test:revision56
          node tests/animated-ui-retrofit.test.js
          node tests/selective-loading-policy.test.js
          npm run test:rdp-final
          node tests/render-deploy-smoke.test.js
          find src scripts tests -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          rm -rf node_modules .git

      - name: Replace target repository source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          shopt -s dotglob nullglob
          cp -a "$SOURCE_ROOT"/. ./
          rm -rf node_modules .git

      - name: Commit validated source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Revise Indonesian language, broadcasts, and RDP menu"
          git push origin HEAD:main
